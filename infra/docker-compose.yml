# Local data stores for the Evidence Intelligence Platform (ARCHITECTURE.md §2).
# Dev only — credentials are local defaults; never use these in any shared env.
#   docker compose -f infra/docker-compose.yml up -d
services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474" # browser
      - "7687:7687" # bolt
    environment:
      NEO4J_AUTH: neo4j/devpassword
    volumes:
      - neo4j-data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # http
      - "6334:6334" # grpc
    volumes:
      - qdrant-data:/qdrant/storage

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: eip
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: eip
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # s3 api
      - "9001:9001" # console
    environment:
      MINIO_ROOT_USER: eip
      MINIO_ROOT_PASSWORD: devpassword
    volumes:
      - minio-data:/data

volumes:
  neo4j-data:
  qdrant-data:
  postgres-data:
  minio-data:
