            || (echo "Generated models are stale — run 'make gen' and commit." && exit 1)

  evidence-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-services/evidence-engine
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync deps
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Type check
        run: uv run mypy
      - name: Tests
        run: uv run pytest -q
      - name: Smoke
        run: uv run python scripts/smoke.py
      - name: Contract codegen drift
        run: |
          make gen
          git diff --exit-code src/eip_evidence/_generated/ \
            || (echo "Generated models are stale — run 'make gen' and commit." && exit 1)

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm gen:contracts
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm format:check
